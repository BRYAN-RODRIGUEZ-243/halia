version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: halia-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-halia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-halia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - halia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-halia}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: halia-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database (se construye automáticamente desde las variables de PostgreSQL)
      DATABASE_URL: postgresql://${POSTGRES_USER:-halia}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-halia}
      
      # Traccar API
      TRACCAR_URL: ${TRACCAR_URL}
      TRACCAR_USER: ${TRACCAR_USER}
      TRACCAR_PASS: ${TRACCAR_PASS}
      
      # JWT Secret
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      
      # App URL (cambiar por tu dominio en producción)
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      
      # Node environment
      NODE_ENV: production
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - halia-network
    volumes:
      - ./prisma:/app/prisma
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npx prisma generate &&
        node server.js
      "

volumes:
  postgres_data:
    driver: local

networks:
  halia-network:
    driver: bridge
